<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feed</title>
</head>
<body>
    <label for="resultFeed">Market Feed:  </label>
    <br>
    <span id="resultFeed">[]</span>


    <script>
            async function getFeed() {
              let host = "https://project1-backend-k4vy.onrender.com";
              let response = await fetch(host + "/market");
              let result = await response.json();
              let map = result
              let ans_string = ""
              for (const entry of Object.entries(map)){
                  ans_string += entry[0] + " : " + entry[1] + "; "
              }
             

              
              
              document.getElementById("resultFeed").textContent = ans_string
              
            }

            getFeed();
            setInterval(getFeed, 5000);
        </script>

</body>
</html>
