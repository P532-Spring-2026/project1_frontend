<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>History</title>
    <style>
    table {
      border: 1px solid;
      border-collapse: collapse;
      margin: 30px;
    }

    table td,
    table th {
      border-left: 1px solid #000;
      border-right: 1px solid #000;
      padding: 8px;
    }

    table td:first-child {
      border-left: none;
    }

    table td:last-child {
      border-right: none;
    }
  </style>
</head>
<body>
    <label for="resultHistory">Trade History:  </label>
    <br>
    <table>
        <thead>
        <tr>
            <th>Timestamp</th>
            <th>Ticker</th>
            <th>Side</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Total Value</th>
        </tr>
        </thead>
        <tbody id="result">
        </tbody>
    </table>

    <script>
        async function getHistory() {
          let host = "https://project1-backend-k4vy.onrender.com";
          let response = await fetch(host + "/history" + "?id=" + localStorage.getItem("curr_user"));
          let result = await response.json();
           let table = document.getElementById("result");
           table.innerHTML = "";
        
    
           for (const entry of result){
            let timestamp = entry.timestamp;
            let ticker = entry.ticker;
            let side = entry.side;
            let quantity = entry.quantity;
            let price = entry.price;
            let total_value = entry.total_value;
            let row = document.createElement("tr");
            let cell1 = document.createElement("td");
            cell1.textContent = timestamp;
            row.appendChild(cell1);
            table.appendChild(row);

            let cell2 = document.createElement("td");
            cell2.textContent = ticker;
            row.appendChild(cell2);
            table.appendChild(row);

            let cell3 = document.createElement("td");
            cell3.textContent = side;
            row.appendChild(cell3);
            table.appendChild(row);

            let cell4 = document.createElement("td");
            cell4.textContent = quantity;
            row.appendChild(cell4);
            table.appendChild(row);

            let cell5 = document.createElement("td");
            cell5.textContent = price;
            row.appendChild(cell5);
            table.appendChild(row);

            let cell6 = document.createElement("td");
            cell6.textContent = total_value;
            row.appendChild(cell6);
            table.appendChild(row);

           }
            
            
        }


        getHistory();
        setInterval(getHistory, 2000);
    </script>

</body>
</html>
