<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>
    <style>
      table {
      border: 1px solid;
      border-collapse: collapse;
      margin: 30px;
    }

    table td,
    table th {
      border-left: 1px solid #000;
      border-right: 1px solid #000;
      padding: 8px;
    }

    table td:first-child {
      border-left: none;
    }

    table td:last-child {
      border-right: none;
    }
    </style>
</head>
<body>
        <h1>Trading System</h1>
        <br>
        <h2>User Portfolio</h2>
        <label for="resultStockHoldings">Stock Holdings: </label>
        <span id="resultStockHoldings">[]</span>
        <br>
        <label for="resultCashBalance">Cash Balance: </label>
        <span id="resultCashBalance">0.0</span>
        <br>
        <label for="resultTotalValue">Total Portfolio Value: </label>
        <span id="resultTotalValue">0.0</span>
        <br>
        <br>
        <br>
        
        <h2>Market Feed</h2>
        <input type="radio" id="Random" name="pricing" value="random" onclick="changePricing()">
        <label for="Random">Random Pricing</label>
        <input type="radio" id="Mean" name="pricing" value="mean" onclick="changePricing()">
        <label for="Mean">Mean-Reversion</label>
        <input type="radio" id="Trending" name="pricing" value="trending" onclick="changePricing()">
        <label for="Trending">Trend-Following</label>
        <br>
        <br>
        <span id="resultFeed">[]</span>
        <br>
        <br>
        <br>

        <h2>Trading Actions</h2>
        <label for="name">Stock name: </label>
        <input id="name"/>
        <label for="quantity">Stock Quantity: </label>
        <input id="quantity" />
        <label for="threshold">Threshold (Limited Orders only): </label>
        <input id="threshold" />
        <input type="radio" id="market_order" name="orders" value="market">
        <label for="market_order">Market Order</label>
        <input type="radio" id="limited_order" name="orders" value="limited">
        <label for="limited_order">Limited Order</label>
        <br>
        <br>
        <button onclick="completeBuyOrder()">Buy</button>
        <button onclick="completeSellOrder()">Sell</button>
        <br>
        <br>
        <br>
        <h2>Notifications</h2>
        <label for="notifs_counter">Dashboard Notifications: </label>
        <span id="notifs_counter">0</span>
        <br>
        <input type="checkbox" id="console_notif" name="notifs" value="console" onclick="changeNotif()">
        <label for="console_notif">Console</label>
        <input type="checkbox" id="email_notif" name="notifs" value="email" onclick="changeNotif()">
        <label for="email_notif">E-Mail</label>
        <input type="checkbox" id="sms_notif" name="notifs" value="sms" onclick="changeNotif()">
        <label for="sms_notif">SMS</label>
        <input type="checkbox" id="dashboard_notif" name="notifs" value="dashboard" onclick="changeNotif()">
        <label for="dashboard_notif">Dashboard</label>
        <br>
        <br>
        <br>
        <h2>Pending Orders</h2>
          <br>
            <table>
              <thead>
                <tr>
                  <th>Stock Name</th>
                  <th>Quantity</th>
                  <th>Side</th>
                  <th>Threshold</th>
                </tr>
              </thead>
              <tbody id="result"></tbody>
            </table>

        
        
        <!--portfolio--->
        <script>
            async function getPortfolio() {
              let host = "https://project1-backend-k4vy.onrender.com";
              let response = await fetch(host + "/portfolio" + "?id=" + localStorage.getItem("curr_user"));

              let result = await response.json();
              let map = result.stock_holdings
               let ans_string = ""
              if (Object.entries(map).length == 0){
                ans_string = "No stock holdings at this moment"
              } else{
                for (const entry of Object.entries(map)){
                  ans_string += entry[0] + " : " + entry[1] + "; "
              }
              }

              document.getElementById("resultStockHoldings").textContent = ans_string
              document.getElementById("resultCashBalance").textContent = result.cash_balance
              document.getElementById("resultTotalValue").textContent = result.total_value
            }

            getPortfolio();
            setInterval(getPortfolio, 5000);
        </script>

       <!--Market Feed-->
        <script>
            async function getFeed() {
              let host = "https://project1-backend-k4vy.onrender.com";
              let response = await fetch(host + "/market");
              let result = await response.json();
              let map = result
              let ans_string = ""
              for (const entry of Object.entries(map)){
                  ans_string += entry[0] + " : " + entry[1] + "; "
              }

              
              document.getElementById("resultFeed").textContent = ans_string
              
            }

            async function changePricing(){
              let host = "https://project1-backend-k4vy.onrender.com";
              let strategy = "";
              if (document.getElementById("Random").checked){
                strategy = "random"
              } else if (document.getElementById("Mean").checked){
                strategy = "mean"
              } else if (document.getElementById("Trending").checked){
                strategy = "trending"
              }

              let formData = new FormData();
              formData.append("strategy", strategy);

              let request = {
                method: "POST",
                body: formData
              };

              let response = await fetch(host + "/market", request);
              if (response.status == 200){
                alert("Pricing changed!")
              } else{
                alert("Something went wrong! Pricing could not be changed!")
              }
            }
            getFeed();
            setInterval(getFeed, 5000);
        </script>

        <!--Buying Orders-->
        <script>
          async function completeBuyOrder() {
            if (document.getElementById("market_order").checked){
              if(document.getElementById("name").value.trim() == "" || document.getElementById("quantity").value.trim() == ""){
                alert("One or more required fields are missing")
              } else{
                completeBMOrder();
              }
            } else if (document.getElementById("limited_order").checked){
              if((document.getElementById("name").value.trim() == "" || document.getElementById("quantity").value.trim() == "") || document.getElementById("threshold").value.trim() == "") {
                alert("One or more required fields are missing")
                } else{
                completeBLOrder();
                }
            } else{
              alert("Please select an order type")
            }
          }

          async function completeBMOrder() {
              let host = "https://project1-backend-k4vy.onrender.com";
              let stockName = document.getElementById("name").value;
              let stockQuantity = document.getElementById("quantity").value;
            

              let formData = new FormData();
              formData.append("name", stockName);
              formData.append("quantity", stockQuantity);
              formData.append("id", localStorage.getItem("curr_user"));

              let request = {
                method: "POST",
                body: formData
              };


              let response = await fetch(host + "/orders/buy/market", request);
              if (response.status == 200){
                alert("Market order submitted.")
              } else if (response.status == 400){
                alert("Can't buy without sufficient money!")
              }else{
                alert("Something went wrong! Order could not be submitted.")
              }
          }

          async function completeBLOrder() {
            let host = "https://project1-backend-k4vy.onrender.com";
            let stockName = document.getElementById("name").value;
            let stockQuantity = document.getElementById("quantity").value;
            let limitThreshold = document.getElementById("threshold").value;

            let formData = new FormData();
            formData.append("name", stockName);
            formData.append("quantity", stockQuantity);
            formData.append("threshold", limitThreshold);
            formData.append("id", localStorage.getItem("curr_user"));


            let request = {
              method: "POST",
              body: formData
            };

            let response = await fetch(host + "/orders/buy/limit", request);
            if (response.status == 200){
              alert("Limit order submitted.")
            } else{
              alert("Something went wrong! Order could not be submitted.")
            }
          }
    </script>
<!--Sell Orders-->

<!---Pending-->
  <script>
        async function getPending() {
          let host = "https://project1-backend-k4vy.onrender.com";
          
          let response = await fetch(host + "/orders/pending" + "?id=" + localStorage.getItem("curr_user"));

          let result = await response.json();
           let table = document.getElementById("result");
           table.innerHTML = "";
        
    
           for (const entry of result){
            let side = entry.function_type;
            let quantity = entry.quantity;
            let name = entry.stockName;
            let threshold = entry.threshold;
            let row = document.createElement("tr");

            let cell1 = document.createElement("td");
            cell1.textContent = name;
            row.appendChild(cell1);
            table.appendChild(row);

            let cell2 = document.createElement("td");
            cell2.textContent = quantity;
            row.appendChild(cell2);
            table.appendChild(row);

            let cell3 = document.createElement("td");
            cell3.textContent = side;
            row.appendChild(cell3);
            table.appendChild(row);

            let cell4 = document.createElement("td");
            cell4.textContent = threshold;
            row.appendChild(cell4);
            table.appendChild(row);
           }
            
            
        }


        getPending();
        setInterval(getPending, 3000);
    </script>

    <!---Notifications-->
  <script>

        async function changeNotif(){
              let host = "https://project1-backend-k4vy.onrender.com";
              let notif_stack = [];
              if (document.getElementById("console_notif").checked){
                notif_stack.push("console")
              } if (document.getElementById("email_notif").checked){
                notif_stack.push("email")
              } if (document.getElementById("sms_notif").checked){
                notif_stack.push("sms")
              }if (document.getElementById("dashboard_notif").checked){
                notif_stack.push("dashboard")
              }

              let formData = new FormData();
              formData.append("notif_stack", notif_stack);
              formData.append("id", localStorage.getItem("curr_user"));


              let request = {
                method: "POST",
                body: formData
              };

              let response = await fetch(host + "/orders/notifs", request);
              if (response.status == 200){
                alert("Notifs succesfully changed!")
              } else{
                alert("Something went wrong! Notifs could not be changed!")
              }
            }

            async function getCount() {
              let host = "https://project1-backend-k4vy.onrender.com";
              
              let response = await fetch(host + "/orders/notifs" + "?id=" + localStorage.getItem("curr_user"));

              let result = await response.json();
              let ans_string = "" + result;
              

              document.getElementById("notifs_counter").textContent = ans_string
        
            }

        getCount();
        setInterval(getCount, 2000);
    </script>


</body>
</html>
